<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Fixy Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; min-height: 100vh; }
    .container { max-width: 440px; margin: 0 auto; padding: 60px 20px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo a { color: #f0f0f0; text-decoration: none; font-size: 28px; font-weight: 700; }
    .logo span { color: #3b82f6; }
    .card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 32px; }
    h2 { font-size: 22px; margin-bottom: 24px; text-align: center; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 14px; color: #888; margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; font-size: 16px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #3b82f6; }
    .btn { display: block; width: 100%; background: #3b82f6; color: #fff; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 16px; border: none; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: #ef4444; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
    .links { text-align: center; margin-top: 20px; }
    .links a { color: #3b82f6; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><a href="/">Fixy<span>Pro</span></a></div>
    <div class="card">
      <h2>Log In</h2>
      <form id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="email" required></div>
        <div class="field"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit" class="btn" id="submitBtn">Log In</button>
        <div class="error-msg" id="error"></div>
      </form>
      <div class="links">
        <a href="/pro/register">Don't have an account? Sign up</a>
      </div>
    </div>
  </div>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('fixy_pro_token')) {
      const leadId = new URLSearchParams(window.location.search).get('leadId');
      window.location.href = leadId ? `/pro/claim?leadId=${leadId}` : '/pro/dashboard';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/pro/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
          return;
        }

        localStorage.setItem('fixy_pro_token', data.token);
        const leadId = new URLSearchParams(window.location.search).get('leadId');
        window.location.href = leadId ? `/pro/claim?leadId=${leadId}` : '/pro/dashboard';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
