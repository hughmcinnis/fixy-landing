<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Fixy Pro</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 480px; margin: 0 auto; padding: 48px 20px; }

    .logo-wrap { text-align: center; margin-bottom: 40px; position: relative; display: flex; flex-direction: column; align-items: center; }
    .logo-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; height: 700px; background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, rgba(29,78,216,0.3) 25%, rgba(30,58,138,0.15) 45%, rgba(30,58,138,0.04) 65%, transparent 80%); border-radius: 50%; pointer-events: none; z-index: 0; }
    .logo-wrap a { position: relative; z-index: 1; display: inline-block; }
    .logo-wrap img { width: 180px; height: 180px; object-fit: cover; border-radius: 28px; }
    .logo-text { position: relative; z-index: 1; margin-top: 12px; font-size: 22px; font-weight: 700; color: #f0f0f0; letter-spacing: -0.3px; }
    .logo-text span { color: #3B82F6; }

    .card { background: #1a1a1a; border: 1px solid #222; border-radius: 16px; padding: 32px; position: relative; z-index: 1; }
    h2 { font-size: 22px; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #999; text-align: center; margin-bottom: 24px; font-size: 14px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 14px; color: #999; margin-bottom: 6px; }
    .field input { width: 100%; padding: 14px 16px; background: #111; border: 1px solid #333; border-radius: 10px; color: #f0f0f0; font-size: 16px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #3B82F6; }
    .btn { display: block; width: 100%; background: #3B82F6; color: #fff; padding: 16px 28px; border-radius: 12px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { color: #ef4444; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
    .links { text-align: center; margin-top: 20px; }
    .links a { color: #3B82F6; text-decoration: none; font-size: 14px; }
    .links a:hover { text-decoration: underline; }
    .benefits { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .benefit { flex: 1; min-width: 110px; text-align: center; padding: 14px 8px; background: #111; border-radius: 10px; border: 1px solid #222; }
    .benefit .icon { font-size: 24px; margin-bottom: 6px; }
    .benefit .text { font-size: 12px; color: #999; }

    @media (max-width: 480px) {
      .logo-glow { width: 400px; height: 400px; }
      .container { padding: 32px 16px; }
      .card { padding: 24px; }
      .benefits { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <a href="/"><img src="/fixy-logo.png" alt="Fixy"></a>
      <div class="logo-text">Fixy <span>Pro</span></div>
    </div>
    <div class="card">
      <h2>Create Your Pro Account</h2>
      <p class="subtitle">Free forever. Get connected with homeowners who need your services.</p>
      <div class="benefits">
        <div class="benefit"><div class="icon">📋</div><div class="text">Get qualified leads</div></div>
        <div class="benefit"><div class="icon">💰</div><div class="text">No fees or commissions</div></div>
        <div class="benefit"><div class="icon">⚡</div><div class="text">Direct contact info</div></div>
      </div>
      <form id="registerForm">
        <div class="field"><label>Company Name</label><input type="text" id="companyName" required></div>
        <div class="field"><label>Email</label><input type="email" id="email" required></div>
        <div class="field"><label>Phone</label><input type="tel" id="phone"></div>
        <div class="field"><label>Password</label><input type="password" id="password" required minlength="8"></div>
        <button type="submit" class="btn" id="submitBtn">Create Account</button>
        <div class="error-msg" id="error"></div>
      </form>
      <div class="links">
        <a href="/pro/login">Already have an account? Log in</a>
      </div>
    </div>
  </div>
  <script>
    if (localStorage.getItem('fixy_pro_token')) {
      const leadId = new URLSearchParams(window.location.search).get('leadId');
      window.location.href = leadId ? `/pro/claim?leadId=${leadId}` : '/pro/dashboard';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/pro/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            companyName: document.getElementById('companyName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value || undefined,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Registration failed';
          errorEl.style.display = 'block';
          return;
        }

        localStorage.setItem('fixy_pro_token', data.token);

        // Store claimed lead ID if registering from a claim link
        const leadId = new URLSearchParams(window.location.search).get('leadId');
        if (leadId) {
          localStorage.setItem('claimedLeadId', leadId);
        }

        window.location.href = leadId ? `/pro/claim?leadId=${leadId}` : '/pro/dashboard';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
